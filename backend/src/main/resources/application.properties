# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:twitterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Auth0 / OAuth2 Resource Server ──────────────────────────────────────────
# Replace with your actual Auth0 domain and audience
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN:YOUR_DOMAIN.us.auth0.com}/
auth0.audience=${AUTH0_AUDIENCE:https://twitter-app-api}

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
