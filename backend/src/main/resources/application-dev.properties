# ─── DEV profile (NO Auth0 required) ──────────────────────────────────────────
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# This profile uses a local HMAC secret to sign/verify JWTs.
# All production Auth0 config is IGNORED in this profile.

# Override the issuer-uri to avoid OIDC discovery calls at startup
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.public-key-location=

auth0.audience=dev-local

spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Allow all CORS origins in dev
app.cors.allowed-origins=*
